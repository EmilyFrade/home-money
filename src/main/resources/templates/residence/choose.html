<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolher Residência</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center" style="height: 100vh; background-color: #f8f9fa;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Escolha sua Residência</h3>
                        
                        <!-- Opções -->
                        <div class="d-flex justify-content-center gap-4 mb-4">
                            <button class="btn btn-primary" onclick="showExistingResidences()">
                                Entrar em uma Residência Existente
                            </button>
                            <button class="btn btn-success" onclick="showNewResidenceForm()">
                                Criar Nova Residência
                            </button>
                        </div>

                        <!-- Lista de Residências Existentes -->
                        <div id="existingResidences" style="display: none;">
                            <h4 class="text-center mb-3">Residências Disponíveis</h4>
                            <div th:if="${#lists.isEmpty(residences)}" class="alert alert-info">
                                Não há residências disponíveis no momento.
                            </div>
                            <form th:unless="${#lists.isEmpty(residences)}" 
                                  th:action="@{/residence/join}" method="post">
                                <div class="list-group">
                                    <div th:each="residence : ${residences}" class="list-group-item">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <div>
                                                <h5 th:text="${residence.name}"></h5>
                                                <small th:text="${residence.street + ', ' + residence.neighborhood}"></small><br>
                                                <small th:text="${residence.city + '/' + residence.state}"></small>
                                            </div>
                                            <button type="submit" name="residenceId" th:value="${residence.id}" 
                                                    class="btn btn-primary btn-sm">
                                                Entrar
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>

                        <!-- Formulário Nova Residência -->
                        <div id="newResidenceForm" style="display: none;">
                            <h4 class="text-center mb-3">Cadastrar Nova Residência</h4>
                            <form th:action="@{/residence/create}" method="post">
                                <div class="mb-3">
                                    <label for="name" class="form-label">Nome da Residência:</label>
                                    <input type="text" class="form-control" id="name" name="name">
                                </div>
                                <div class="mb-3">
                                    <label for="street" class="form-label">Logradouro:</label>
                                    <input type="text" class="form-control" id="street" name="street" required>
                                </div>
                                <div class="row mb-3">
                                    <div class="col">
                                        <label for="neighborhood" class="form-label">Bairro:</label>
                                        <input type="text" class="form-control" id="neighborhood" name="neighborhood" required>
                                    </div>
                                    <div class="col">
                                        <label for="zipCode" class="form-label">CEP:</label>
                                        <input type="text" class="form-control" id="zipCode" name="zipCode" required>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col">
                                        <label for="city" class="form-label">Cidade:</label>
                                        <input type="text" class="form-control" id="city" name="city" required>
                                    </div>
                                    <div class="col">
                                        <label for="state" class="form-label">Estado:</label>
                                        <input type="text" class="form-control" id="state" name="state" maxlength="2" required>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col">
                                        <label for="rentValue" class="form-label">Valor do Aluguel:</label>
                                        <input type="number" class="form-control" id="rentValue" name="rentValue" required>
                                    </div>
                                    <div class="col">
                                        <label for="maxCapacity" class="form-label">Capacidade de Moradores:</label>
                                        <input type="number" class="form-control" id="maxCapacity" name="maxCapacity" required>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-success w-100">Criar Residência</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showExistingResidences() {
            document.getElementById('existingResidences').style.display = 'block';
            document.getElementById('newResidenceForm').style.display = 'none';
        }

        function showNewResidenceForm() {
            document.getElementById('existingResidences').style.display = 'none';
            document.getElementById('newResidenceForm').style.display = 'block';
        }
    </script>
</body>
</html>
